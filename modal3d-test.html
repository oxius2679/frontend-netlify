<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Modal 3D Test - Vista Separada</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0a0e1a 0%, #1a1a3a 100%);
            color: white;
            padding: 40px;
            min-height: 100vh;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        h1 {
            font-size: 36px;
            margin-bottom: 20px;
            background: linear-gradient(135deg, #d4af37, #f4e4a6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .btn {
            padding: 15px 30px;
            background: linear-gradient(135deg, #d4af37, #f4e4a6);
            color: #0a0e1a;
            border: none;
            border-radius: 30px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin: 10px;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(212, 175, 55, 0.4);
        }
        #modal3D {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 99999;
            justify-content: center;
            align-items: center;
        }
        #modal3D.active {
            display: flex;
        }
        .modal-content {
            background: #1a1a2e;
            padding: 40px;
            border-radius: 20px;
            max-width: 90%;
            max-height: 90%;
            overflow: auto;
            border: 2px solid #d4af37;
        }
        #canvas3D {
            width: 600px;
            height: 400px;
            background: #000;
            border-radius: 10px;
            margin: 20px 0;
        }
        .status {
            padding: 15px;
            border-radius: 10px;
            margin: 10px 0;
        }
        .status.success { background: rgba(16, 185, 129, 0.2); border: 1px solid #10b981; }
        .status.error { background: rgba(239, 68, 68, 0.2); border: 1px solid #ef4444; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎯 Modal 3D Test - Vista Separada</h1>
        <p>Esta vista NO tiene los interceptores de tu index.html</p>
        
        <div id="status"></div>
        
        <button class="btn" onclick="abrirModal3D()"> Abrir Modal 3D</button>
        <button class="btn" onclick="testWebGL()">🔬 Test WebGL</button>
        <button class="btn" onclick="limpiarTodo()">🧹 Limpiar Todo</button>
        
        <div id="modal3D">
            <div class="modal-content">
                <h2 style="color: #d4af37; margin-bottom: 20px;">Modal 3D Premium</h2>
                <canvas id="canvas3D"></canvas>
                <div id="webglStatus"></div>
                <button class="btn" onclick="cerrarModal()"> Cerrar</button>
            </div>
        </div>
    </div>
    
    <script>
        function log(msg, type = 'info') {
            const status = document.getElementById('status');
            const div = document.createElement('div');
            div.className = `status ${type}`;
            div.textContent = msg;
            status.appendChild(div);
            console.log(msg);
        }
        
        function testWebGL() {
            log('🔬 Probando WebGL...', 'info');
            
            const canvas = document.createElement('canvas');
            canvas.width = 100;
            canvas.height = 100;
            
            try {
                const gl = canvas.getContext('webgl');
                if (gl) {
                    log('✅ WebGL funciona correctamente', 'success');
                    log(`📊 Vendor: ${gl.getParameter(gl.VENDOR)}`, 'info');
                    log(`📊 Renderer: ${gl.getParameter(gl.RENDERER)}`, 'info');
                    log(`📊 Versión: ${gl.getParameter(gl.VERSION)}`, 'info');
                } else {
                    log('❌ WebGL no disponible', 'error');
                }
            } catch(e) {
                log(`❌ Error: ${e.message}`, 'error');
            }
        }
        
        function abrirModal3D() {
            log('🎯 Abriendo Modal 3D...', 'info');
            
            const modal = document.getElementById('modal3D');
            modal.classList.add('active');
            
            setTimeout(() => {
                inicializarThreeJS();
            }, 100);
        }
        
        function cerrarModal() {
            document.getElementById('modal3D').classList.remove('active');
        }
        
        function limpiarTodo() {
            document.querySelectorAll('canvas').forEach(canvas => {
                if (canvas.id !== 'canvas3D') {
                    canvas.remove();
                }
            });
            log('🧹 Canvas limpiados', 'success');
        }
        
        function inicializarThreeJS() {
            const canvas = document.getElementById('canvas3D');
            const statusDiv = document.getElementById('webglStatus');
            
            try {
                // Crear escena
                const scene = new THREE.Scene();
                scene.background = new THREE.Color(0x0a0e1a);
                
                // Crear cámara
                const camera = new THREE.PerspectiveCamera(75, canvas.width / canvas.height, 0.1, 1000);
                camera.position.z = 5;
                
                // Crear renderer
                const renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true });
                renderer.setSize(canvas.width, canvas.height);
                
                // Crear geometría (cubo rotatorio)
                const geometry = new THREE.BoxGeometry(2, 2, 2);
                const material = new THREE.MeshPhongMaterial({ 
                    color: 0xd4af37,
                    specular: 0xf4e4a6,
                    shininess: 100
                });
                const cube = new THREE.Mesh(geometry, material);
                scene.add(cube);
                
                // Agregar luces
                const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
                scene.add(ambientLight);
                
                const directionalLight = new THREE.DirectionalLight(0xffffff, 1);
                directionalLight.position.set(5, 5, 5);
                scene.add(directionalLight);
                
                // Animar
                function animate() {
                    requestAnimationFrame(animate);
                    cube.rotation.x += 0.01;
                    cube.rotation.y += 0.01;
                    renderer.render(scene, camera);
                }
                animate();
                
                statusDiv.innerHTML = '<div class="status success">✅ Three.js funcionando correctamente</div>';
                log('✅ Modal 3D inicializado con Three.js', 'success');
                
            } catch(e) {
                statusDiv.innerHTML = `<div class="status error">❌ Error: ${e.message}</div>`;
                log(`❌ Error inicializando Three.js: ${e.message}`, 'error');
            }
        }
        
        // Test automático al cargar
        window.addEventListener('load', () => {
            log(' Vista cargada correctamente', 'success');
            testWebGL();
        });
    </script>
</body>
</html>
