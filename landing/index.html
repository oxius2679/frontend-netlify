<!-- ===== MODAL DE REGISTRO ===== -->
<div id="registerModal" class="modal">
<div class="modal-content">
<div class="modal-header">
<h2 class="modal-title">
<i class="fas fa-rocket" style="color: var(--primary); margin-right: 12px;"></i>
Comenzar Prueba Gratuita
</h2>
<button class="close-modal" onclick="closeRegisterModal()">
<i class="fas fa-times"></i>
</button>
</div>
<!-- ... (resto del modal se queda igual) ... -->

<!-- ===== SCRIPT CORREGIDO (VERSIÓN PARA NETLIFY) ===== -->
<script>
document.addEventListener('DOMContentLoaded', function() {
    console.log('✅ DOM cargado - Landing page en Netlify');
    
    // ===== VERIFICAR FORMULARIO =====
    const registerForm = document.getElementById('registerForm');
    if (!registerForm) {
        console.error('❌ Error: Formulario no encontrado');
        return;
    }
    
    // ===== ELIMINAR onsubmit INLINE =====
    if (registerForm.hasAttribute('onsubmit')) {
        registerForm.removeAttribute('onsubmit');
    }
    
    // ===== EVENTO SUBMIT =====
    registerForm.addEventListener('submit', function(event) {
        event.preventDefault();
        event.stopPropagation();
        
        try {
            // Obtener valores
            const nameInput = document.getElementById('registerName');
            const emailInput = document.getElementById('registerEmail');
            const passwordInput = document.getElementById('registerPassword');
            
            const name = nameInput ? nameInput.value.trim() : '';
            const email = emailInput ? emailInput.value.trim() : '';
            const password = passwordInput ? passwordInput.value.trim() : '';
            
            // Validaciones
            if (!name) throw new Error('Nombre requerido');
            if (!email || !email.includes('@')) throw new Error('Email válido requerido');
            if (password.length < 6) throw new Error('Contraseña mínimo 6 caracteres');
            
            console.log('✅ Validaciones OK');
            
            // Guardar datos del usuario
            const userData = {
                name: name,
                email: email,
                plan: 'free',
                registeredAt: new Date().toISOString()
            };
            
            // Guardar en localStorage
            try {
                localStorage.setItem('gantt_user', JSON.stringify(userData));
                localStorage.setItem('userName', name);
                localStorage.setItem('userEmail', email);
                console.log('✅ Datos guardados en localStorage');
            } catch (e) {
                console.warn('⚠️ Error guardando en localStorage:', e);
            }
            
            // Mostrar confirmación
            alert(`🎉 ¡Bienvenido ${name}!\n✅ Cuenta creada\n📧 ${email}\n📋 Plan: Free\n\nRedirigiendo al sistema...`);
            
            // Cerrar modal
            closeRegisterModal();
            
            // REDIRECCIÓN ÚNICA - a Netlify
            setTimeout(function() {
                console.log('🚀 Redirigiendo a aplicación en Netlify');
                window.location.href = 'https://tourmaline-bavarois-4eb193.netlify.app/';
            }, 1500);
            
        } catch (error) {
            console.error('❌ Error:', error);
            alert('❌ ' + error.message);
        }
        
        return false;
    });
    
    // ===== FUNCIONES MODAL =====
    window.openRegisterModal = function() {
        const modal = document.getElementById('registerModal');
        if (modal) {
            modal.classList.add('active');
            document.body.style.overflow = 'hidden';
        }
    };
    
    window.closeRegisterModal = function() {
        const modal = document.getElementById('registerModal');
        if (modal) {
            modal.classList.remove('active');
            document.body.style.overflow = '';
        }
    };
    
    // Cerrar modal al hacer clic fuera
    const modal = document.getElementById('registerModal');
    if (modal) {
        modal.addEventListener('click', function(e) {
            if (e.target === this) {
                closeRegisterModal();
            }
        });
    }
    
    // ===== REDIRECCIÓN DIRECTA =====
    window.redirectToSystem = function() {
        console.log('🚀 Redirigiendo directamente a Netlify');
        window.location.href = 'https://tourmaline-bavarois-4eb193.netlify.app/';
    };
    
    window.viewDemo = function() {
        console.log('🎬 Redirigiendo a sistema.html (puede no existir en Netlify)');
        window.location.href = 'sistema.html';
    };
    
    console.log('✅ Sistema listo - URL Netlify configurada');
});
</script>
</body>
</html>
