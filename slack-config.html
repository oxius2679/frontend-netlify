<div id="slack-config-section" style="margin: 20px; padding: 20px; background: #1a1a2e; border-radius: 10px;">
  <h3 style="color: #8b5cf6;">🔔 Notificaciones Slack</h3>
  
  <div id="slack-status">
    <p>Verificando configuración...</p>
  </div>
  
  <button id="connect-slack-btn" class="btn-4d" style="display: none; margin-top: 15px;">
    🔗 Conectar con Slack
  </button>
</div>

<script>
// Verificar estado de Slack al cargar
async function checkSlackStatus() {
  try {
    const response = await fetch(`${window.API_URL}/api/slack/webhook`, {
      headers: { 'Authorization': `Bearer ${localStorage.getItem('authToken')}` }
    });
    
    const data = await response.json();
    const statusDiv = document.getElementById('slack-status');
    const connectBtn = document.getElementById('connect-slack-btn');
    
    if (data.configured) {
      statusDiv.innerHTML = `
        <div style="background: rgba(16, 185, 129, 0.1); border: 1px solid #10b981; border-radius: 8px; padding: 15px;">
          <p style="color: #10b981; margin: 0;">✅ Slack conectado</p>
          <p style="color: white; margin: 5px 0 0 0;">Canal: <strong>${data.channel || '#general'}</strong></p>
          <p style="color: #94a3b8; margin: 0; font-size: 12px;">Equipo: ${data.teamName || 'Desconocido'}</p>
          <button onclick="reconnectSlack()" style="background: #4b5563; color: white; border: none; padding: 5px 15px; border-radius: 5px; margin-top: 10px; cursor: pointer;">
            Reconectar
          </button>
        </div>
      `;
      connectBtn.style.display = 'none';
    } else {
      statusDiv.innerHTML = `
        <div style="background: rgba(245, 158, 11, 0.1); border: 1px solid #f59e0b; border-radius: 8px; padding: 15px;">
          <p style="color: #f59e0b; margin: 0;">⚠️ Slack no configurado</p>
          <p style="color: #94a3b8; margin: 5px 0 0 0;">Conecta para recibir notificaciones</p>
        </div>
      `;
      connectBtn.style.display = 'inline-block';
    }
  } catch (error) {
    console.error('Error:', error);
    document.getElementById('slack-status').innerHTML = `
      <div style="background: rgba(239, 68, 68, 0.1); border: 1px solid #ef4444; border-radius: 8px; padding: 15px;">
        <p style="color: #ef4444; margin: 0;">❌ Error al verificar estado</p>
      </div>
    `;
  }
}

// Iniciar conexión
document.getElementById('connect-slack-btn')?.addEventListener('click', () => {
  window.location.href = `${window.API_URL}/api/slack/install`;
});

window.reconnectSlack = function() {
  window.location.href = `${window.API_URL}/api/slack/install`;
};

// Verificar parámetros de retorno
const urlParams = new URLSearchParams(window.location.search);
if (urlParams.get('slack') === 'success') {
  alert('✅ Slack conectado exitosamente');
  // Limpiar URL
  window.history.replaceState({}, document.title, window.location.pathname);
} else if (urlParams.get('slack') === 'error') {
  alert('❌ Error al conectar Slack. Intenta de nuevo');
  window.history.replaceState({}, document.title, window.location.pathname);
}

// Ejecutar al cargar
checkSlackStatus();
</script>
