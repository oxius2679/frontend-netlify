<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aceptar Invitación</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #0a0a1a 0%, #121230 100%);
            color: white;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            background: #1a1a3a;
            border-radius: 30px;
            padding: 40px;
            width: 500px;
            max-width: 90%;
            border: 2px solid #8b5cf6;
            text-align: center;
            box-shadow: 0 20px 40px rgba(139, 92, 246, 0.2);
        }
        h1 {
            margin: 0 0 20px 0;
            font-size: 32px;
            background: linear-gradient(45deg, #8b5cf6, #ec4899);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        p {
            color: #94a3b8;
            line-height: 1.6;
            margin-bottom: 30px;
        }
        .button {
            display: inline-block;
            background: #8b5cf6;
            color: white;
            text-decoration: none;
            padding: 15px 40px;
            border-radius: 30px;
            font-weight: bold;
            margin: 10px;
            transition: all 0.3s;
            border: none;
            cursor: pointer;
        }
        .button:hover {
            background: #7c3aed;
            transform: translateY(-2px);
        }
        .button.secondary {
            background: #2d2d5f;
        }
        .info {
            background: #24244a;
            border-radius: 15px;
            padding: 20px;
            margin: 20px 0;
            text-align: left;
        }
        .info-item {
            margin: 10px 0;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .loading {
            display: none;
            margin: 20px 0;
        }
        .error {
            color: #ef4444;
            background: rgba(239, 68, 68, 0.1);
            padding: 15px;
            border-radius: 10px;
            margin: 20px 0;
        }
        .success {
            color: #10b981;
            background: rgba(16, 185, 129, 0.1);
            padding: 15px;
            border-radius: 10px;
            margin: 20px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🤖 Centro de Comando IA</h1>
        <p>Has sido invitado a colaborar en un proyecto</p>
        
        <div id="infoInvitacion" class="info">
            <div class="info-item">
                <span style="color: #8b5cf6;">📁</span>
                <span id="proyectoNombre">Cargando...</span>
            </div>
            <div class="info-item">
                <span style="color: #10b981;">👑</span>
                <span id="rolInvitacion">Cargando...</span>
            </div>
            <div class="info-item">
                <span style="color: #94a3b8;">👤</span>
                <span id="emailInvitado">Cargando...</span>
            </div>
        </div>

        <div id="loading" class="loading">
            <p>Procesando invitación...</p>
        </div>

        <div id="errorMessage" class="error" style="display: none;"></div>
        <div id="successMessage" class="success" style="display: none;"></div>

        <div id="actionButtons">
            <button onclick="aceptarInvitacion()" class="button">✅ Aceptar invitación</button>
            <button onclick="rechazarInvitacion()" class="button secondary">❌ Rechazar</button>
        </div>
    </div>

    <script>
        // Obtener token de la URL
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');

        // Variable para almacenar la invitación actual
        let invitacionActual = null;

        // Cargar datos de la invitación
        async function cargarInvitacion() {
            try {
                const invitaciones = JSON.parse(localStorage.getItem('invitacionesPendientes') || '[]');
                const invitacion = invitaciones.find(inv => inv.token === token);
                
                if (invitacion) {
                    invitacionActual = invitacion;
                    document.getElementById('proyectoNombre').textContent = invitacion.proyecto;
                    document.getElementById('rolInvitacion').textContent = invitacion.rol;
                    document.getElementById('emailInvitado').textContent = invitacion.email;
                } else {
                    mostrarError('Invitación no encontrada o expirada');
                }
            } catch (error) {
                console.error('Error:', error);
                mostrarError('Error al cargar la invitación');
            }
        }

        function mostrarError(mensaje) {
            document.getElementById('errorMessage').style.display = 'block';
            document.getElementById('errorMessage').textContent = mensaje;
            document.getElementById('infoInvitacion').style.display = 'none';
            document.getElementById('actionButtons').style.display = 'none';
        }

        function mostrarExito(mensaje) {
            document.getElementById('successMessage').style.display = 'block';
            document.getElementById('successMessage').textContent = mensaje;
            document.getElementById('infoInvitacion').style.display = 'none';
            document.getElementById('actionButtons').style.display = 'none';
        }

        async function aceptarInvitacion() {
            document.getElementById('loading').style.display = 'block';
            document.getElementById('actionButtons').style.display = 'none';
            
            setTimeout(() => {
                mostrarExito('✅ ¡Invitación aceptada! Serás redirigido al proyecto...');
                
                // Redirigir al proyecto específico
                setTimeout(() => {
                    if (invitacionActual && invitacionActual.proyectoIndex !== undefined) {
                        // Redirigir a la página principal con el parámetro del proyecto
                        window.location.href = `/?proyecto=${invitacionActual.proyectoIndex}`;
                    } else {
                        // Si no hay información del proyecto, ir a la página principal
                        window.location.href = '/';
                    }
                }, 2000);
            }, 1500);
        }

        function rechazarInvitacion() {
            if (confirm('¿Estás seguro de rechazar esta invitación?')) {
                mostrarExito('Invitación rechazada');
                setTimeout(() => {
                    window.location.href = '/';
                }, 2000);
            }
        }

        // Cargar al iniciar
        if (token) {
            cargarInvitacion();
        } else {
            mostrarError('Token de invitación no válido');
        }
    </script>
</body>
</html>
