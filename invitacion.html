<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aceptar Invitación | Centro de Comando IA</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: linear-gradient(135deg, #0a0a1a 0%, #121230 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: rgba(26, 26, 58, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 32px;
            padding: 40px;
            width: 500px;
            max-width: 100%;
            border: 1px solid rgba(139, 92, 246, 0.4);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
        }
        h1 {
            font-size: 32px;
            margin-bottom: 16px;
            background: linear-gradient(135deg, #8b5cf6, #ec4899);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .subtitle {
            color: #94a3b8;
            margin-bottom: 30px;
            font-size: 14px;
        }
        .info-card {
            background: rgba(15, 23, 42, 0.6);
            border-radius: 20px;
            padding: 24px;
            margin: 20px 0;
            text-align: left;
            border: 1px solid rgba(139, 92, 246, 0.2);
        }
        .info-row {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
        .info-row:last-child { border-bottom: none; }
        .info-icon { font-size: 20px; width: 32px; }
        .info-label { color: #94a3b8; font-size: 12px; margin-bottom: 2px; }
        .info-value { color: white; font-weight: 500; font-size: 14px; }
        .buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 25px;
        }
        .btn {
            padding: 12px 28px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            border: none;
            font-size: 14px;
        }
        .btn-primary {
            background: linear-gradient(135deg, #8b5cf6, #6d28d9);
            color: white;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(139, 92, 246, 0.3);
        }
        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: #cbd5e1;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.2);
        }
        .loading {
            display: none;
            padding: 30px;
            color: #8b5cf6;
        }
        .error-message {
            background: rgba(239, 68, 68, 0.15);
            border: 1px solid #ef4444;
            border-radius: 12px;
            padding: 15px;
            color: #fca5a5;
            margin: 20px 0;
            display: none;
        }
        .success-message {
            background: rgba(16, 185, 129, 0.15);
            border: 1px solid #10b981;
            border-radius: 12px;
            padding: 15px;
            color: #6ee7b7;
            margin: 20px 0;
            display: none;
        }
        .loader {
            width: 40px;
            height: 40px;
            border: 3px solid #334155;
            border-top-color: #8b5cf6;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎯 Centro de Comando IA</h1>
        <p class="subtitle">Has sido invitado a colaborar en un proyecto</p>
        
        <div id="loadingState" class="loading">
            <div class="loader"></div>
            <p>Verificando invitación...</p>
        </div>
        
        <div id="infoCard" class="info-card" style="display: none;">
            <div class="info-row">
                <div class="info-icon">📁</div>
                <div>
                    <div class="info-label">PROYECTO</div>
                    <div class="info-value" id="proyectoNombre">-</div>
                </div>
            </div>
            <div class="info-row">
                <div class="info-icon">👑</div>
                <div>
                    <div class="info-label">ROL ASIGNADO</div>
                    <div class="info-value" id="rolInvitacion">-</div>
                </div>
            </div>
            <div class="info-row">
                <div class="info-icon">👤</div>
                <div>
                    <div class="info-label">EMAIL</div>
                    <div class="info-value" id="emailInvitado">-</div>
                </div>
            </div>
        </div>
        
        <div id="errorMessage" class="error-message"></div>
        <div id="successMessage" class="success-message"></div>
        
        <div id="actionButtons" class="buttons" style="display: none;">
            <button class="btn btn-primary" id="acceptBtn">✅ Aceptar invitación</button>
            <button class="btn btn-secondary" id="rejectBtn">❌ Rechazar</button>
        </div>
    </div>

    <script>
        // Configuración - AJUSTA ESTA URL SI ES NECESARIO
        const API_URL = 'https://mi-sistema-proyectos-backend-4.onrender.com';
        
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');
        
        let invitationData = null;

        async function loadInvitation() {
            if (!token) {
                showError('Token de invitación no válido');
                return;
            }
            
            try {
                document.getElementById('loadingState').style.display = 'block';
                
                const response = await fetch(`${API_URL}/api/invitations/validate?token=${token}`);
                const data = await response.json();
                
                if (!data.success) {
                    showError(data.error || 'Invitación no válida');
                    return;
                }
                
                invitationData = data;
                
                document.getElementById('proyectoNombre').textContent = data.proyecto;
                document.getElementById('rolInvitacion').textContent = data.rol;
                document.getElementById('emailInvitado').textContent = data.email;
                
                document.getElementById('loadingState').style.display = 'none';
                document.getElementById('infoCard').style.display = 'block';
                document.getElementById('actionButtons').style.display = 'flex';
                
            } catch (error) {
                console.error('Error:', error);
                showError('Error al cargar la invitación. Intenta nuevamente.');
            }
        }
        
        function showError(message) {
            document.getElementById('loadingState').style.display = 'none';
            document.getElementById('infoCard').style.display = 'none';
            document.getElementById('actionButtons').style.display = 'none';
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
        }
        
        function showSuccess(message) {
            document.getElementById('loadingState').style.display = 'none';
            document.getElementById('infoCard').style.display = 'none';
            document.getElementById('actionButtons').style.display = 'none';
            const successDiv = document.getElementById('successMessage');
            successDiv.textContent = message;
            successDiv.style.display = 'block';
        }
        
   async function acceptInvitation() {
    document.getElementById('loadingState').style.display = 'block';
    document.getElementById('actionButtons').style.display = 'none';
    
    try {
        const response = await fetch(`${API_URL}/api/invitations/accept`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ token })
        });
        
        const data = await response.json();
        
        if (!data.success) {
            throw new Error(data.error);
        }
        
        // Guardar datos de la invitación para usarlos después del login
        const invitationData = {
            clienteId: data.clienteId,
            proyectoIndex: data.proyectoIndex,
            proyectoNombre: data.proyectoNombre,
            rol: data.rol,
            timestamp: Date.now()
        };
        
        localStorage.setItem('pendingInvitation', JSON.stringify(invitationData));
// ========== AGREGAR ESTAS 2 LÍNEAS ==========
localStorage.setItem('clienteId', data.clienteId);
localStorage.setItem('forceProjectRefresh', Date.now().toString());
// ===========================================
        
        showSuccess(`✅ ¡Invitación aceptada! Por favor inicia sesión para acceder al proyecto "${data.proyectoNombre}".`);
        
        // Redirigir al login después de 2 segundos
        setTimeout(() => {
            // Limpiar datos anteriores
            localStorage.removeItem('authToken');
            localStorage.removeItem('clienteId');
            localStorage.removeItem('user');
            localStorage.removeItem('userPlan');
            
            window.location.href = '/';
        }, 2000);
        
    } catch (error) {
        console.error('Error:', error);
        document.getElementById('loadingState').style.display = 'none';
        showError('Error al aceptar la invitación: ' + error.message);
    }
}
        function rejectInvitation() {
    if (confirm('¿Estás seguro de rechazar esta invitación?')) {
        showSuccess('Invitación rechazada. Serás redirigido...');
        setTimeout(() => {
            window.location.href = '/';
        }, 2000);
    }
}
        
               // Inicializar eventos
        document.getElementById('acceptBtn').onclick = acceptInvitation;
        document.getElementById('rejectBtn').onclick = rejectInvitation;
        
        // Cargar la invitación
        loadInvitation();
        
        
    </script>
</body>
</html>
