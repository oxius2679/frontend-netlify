<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aceptar Invitación | Centro de Comando IA</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: linear-gradient(135deg, #0a0a1a 0%, #121230 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: rgba(26, 26, 58, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 32px;
            padding: 40px;
            width: 500px;
            max-width: 100%;
            border: 1px solid rgba(139, 92, 246, 0.4);
            text-align: center;
        }
        h1 {
            font-size: 32px;
            margin-bottom: 16px;
            background: linear-gradient(135deg, #8b5cf6, #ec4899);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .subtitle {
            color: #94a3b8;
            margin-bottom: 30px;
            font-size: 14px;
        }
        .info-card {
            background: rgba(15, 23, 42, 0.6);
            border-radius: 20px;
            padding: 24px;
            margin: 20px 0;
            text-align: left;
            border: 1px solid rgba(139, 92, 246, 0.2);
        }
        .info-row {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
        .info-row:last-child {
            border-bottom: none;
        }
        .info-icon {
            font-size: 20px;
            width: 32px;
        }
        .info-label {
            color: #94a3b8;
            font-size: 12px;
        }
        .info-value {
            color: white;
            font-weight: 500;
        }
        .buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 25px;
        }
        .btn {
            padding: 12px 28px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            font-size: 14px;
            transition: all 0.3s ease;
        }
        .btn-primary {
            background: linear-gradient(135deg, #8b5cf6, #6d28d9);
            color: white;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(139, 92, 246, 0.3);
        }
        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: #cbd5e1;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.2);
        }
        .loading {
            display: none;
            padding: 30px;
        }
        .loader {
            width: 40px;
            height: 40px;
            border: 3px solid #334155;
            border-top-color: #8b5cf6;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .error-message, .success-message {
            display: none;
            padding: 15px;
            border-radius: 12px;
            margin: 20px 0;
        }
        .error-message {
            background: rgba(239, 68, 68, 0.15);
            border: 1px solid #ef4444;
            color: #fca5a5;
        }
        .success-message {
            background: rgba(16, 185, 129, 0.15);
            border: 1px solid #10b981;
            color: #6ee7b7;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎯 Centro de Comando IA</h1>
        <p class="subtitle">Has sido invitado a colaborar en un proyecto</p>

        <div id="loadingState" class="loading">
            <div class="loader"></div>
            <p>Verificando invitación...</p>
        </div>

        <div id="infoCard" class="info-card" style="display: none;"></div>

        <div id="errorMessage" class="error-message"></div>
        <div id="successMessage" class="success-message"></div>

        <div id="actionButtons" class="buttons" style="display: none;">
            <button class="btn btn-primary" id="acceptBtn">✅ Aceptar invitación</button>
            <button class="btn btn-secondary" id="rejectBtn">❌ Rechazar</button>
        </div>
    </div>

    <script>
        // ============================================
        // CONFIGURACIÓN
        // ============================================
        const API_URL = 'https://mi-sistema-proyectos-backend-4.onrender.com';
        const token = new URLSearchParams(window.location.search).get('token');
        let invitationData = null;

        // ============================================
        // CARGAR INFORMACIÓN DE LA INVITACIÓN
        // ============================================
        async function loadInvitation() {
            if (!token) {
                showError('Token de invitación no válido');
                return;
            }

            try {
                document.getElementById('loadingState').style.display = 'block';

                const response = await fetch(`${API_URL}/api/invitations/validate?token=${token}`);
                const data = await response.json();

                if (!data.success) {
                    throw new Error(data.error || 'Invitación no válida');
                }

                invitationData = data;

                // Mostrar información de la invitación
                const infoCard = document.getElementById('infoCard');
                infoCard.innerHTML = `
                    <div class="info-row">
                        <div class="info-icon">📁</div>
                        <div>
                            <div class="info-label">PROYECTO</div>
                            <div class="info-value">${data.proyecto}</div>
                        </div>
                    </div>
                    <div class="info-row">
                        <div class="info-icon">👑</div>
                        <div>
                            <div class="info-label">ROL ASIGNADO</div>
                            <div class="info-value">${data.rol}</div>
                        </div>
                    </div>
                    <div class="info-row">
                        <div class="info-icon">👤</div>
                        <div>
                            <div class="info-label">EMAIL</div>
                            <div class="info-value">${data.email}</div>
                        </div>
                    </div>
                `;

                document.getElementById('loadingState').style.display = 'none';
                infoCard.style.display = 'block';
                document.getElementById('actionButtons').style.display = 'flex';

            } catch (error) {
                console.error('Error:', error);
                showError(error.message);
            }
        }

        // ============================================
        // MOSTRAR ERROR
        // ============================================
        function showError(message) {
            document.getElementById('loadingState').style.display = 'none';
            document.getElementById('infoCard').style.display = 'none';
            document.getElementById('actionButtons').style.display = 'none';
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
        }

        // ============================================
        // MOSTRAR ÉXITO
        // ============================================
        function showSuccess(message) {
            document.getElementById('loadingState').style.display = 'none';
            document.getElementById('infoCard').style.display = 'none';
            document.getElementById('actionButtons').style.display = 'none';
            const successDiv = document.getElementById('successMessage');
            successDiv.textContent = message;
            successDiv.style.display = 'block';
        }

        // ============================================
        // ACEPTAR INVITACIÓN - VERSIÓN DEFINITIVA
        // ============================================
        async function acceptInvitation() {
            // Mostrar loading
            document.getElementById('loadingState').style.display = 'block';
            document.getElementById('actionButtons').style.display = 'none';

            try {
                // 1. Llamar al backend para aceptar la invitación
                const response = await fetch(`${API_URL}/api/invitations/accept`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ token })
                });

                const data = await response.json();

                if (!data.success) {
                    throw new Error(data.error || 'Error al aceptar la invitación');
                }

                // 2. Generar un ID ÚNICO para el invitado (NO usar el del admin)
                const uniqueClienteId = 'invitado_' + Date.now() + '_' + Math.random().toString(36).substr(2, 8);
                
                // 3. Guardar en localStorage
                localStorage.clear(); // Limpiar datos anteriores del invitado
                localStorage.setItem('clienteId', uniqueClienteId);
                localStorage.setItem('userPlan', 'free');
                
                // 4. Guardar el proyecto al que fue invitado
                const proyectoInvitado = {
                    projectId: data.proyectoIndex !== undefined ? data.proyectoIndex : invitationData?.proyectoIndex,
                    projectName: data.proyectoNombre || invitationData?.proyecto,
                    role: data.rol || invitationData?.rol
                };
                
                localStorage.setItem('invitedProjects', JSON.stringify([proyectoInvitado]));
                
                // 5. Guardar copia de respaldo
                sessionStorage.setItem('backup_invitedProjects', JSON.stringify([proyectoInvitado]));
                sessionStorage.setItem('backup_clienteId', uniqueClienteId);
                
                // 6. Guardar email del usuario (para futuras referencias)
                if (invitationData?.email) {
                    localStorage.setItem('userEmail', invitationData.email);
                }
                
                console.log('✅ DATOS GUARDADOS CORRECTAMENTE:');
                console.log('   - clienteId:', uniqueClienteId);
                console.log('   - invitedProjects:', [proyectoInvitado]);
                console.log('   - Tipo: INVITADO (ID único)');
                
                // 7. Mostrar mensaje de éxito
                showSuccess(`✅ ¡Invitación aceptada! Serás redirigido al dashboard del proyecto "${proyectoInvitado.projectName}"...`);
                
                // 8. Redirigir después de 2 segundos
                setTimeout(() => {
                    window.location.href = '/';
                }, 2000);
                
            } catch (error) {
                console.error('❌ Error aceptando invitación:', error);
                document.getElementById('loadingState').style.display = 'none';
                showError('Error al aceptar la invitación: ' + error.message);
            }
        }

        // ============================================
        // RECHAZAR INVITACIÓN
        // ============================================
        function rejectInvitation() {
            if (confirm('¿Estás seguro de rechazar esta invitación?')) {
                showSuccess('Invitación rechazada. Serás redirigido...');
                setTimeout(() => {
                    window.location.href = '/';
                }, 2000);
            }
        }

        // ============================================
        // INICIALIZAR
        // ============================================
        document.getElementById('acceptBtn').onclick = acceptInvitation;
        document.getElementById('rejectBtn').onclick = rejectInvitation;
        
        // Cargar la invitación
        loadInvitation();
    </script>
</body>
</html>
